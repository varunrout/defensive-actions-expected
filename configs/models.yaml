seed: 42
folds: 5
group_column: match_id
identity_columns: [event_id, match_id, player_id, player_name, team, action_family, phase_label, position_group]
mlflow:
  enabled: true
  tracking_uri: null
  classification_experiment: dax-shot-classification
  regression_experiment: dax-future-xg-regression
  run_name_prefix: baseline
  log_models: true
  log_artifacts: true
  autolog_sklearn: false
classification:
  target: target_future_shot_10s
  variants:
    b0_constant: {model_family: constant_rate, feature_scope: pre_action_context, categorical_features: [], numeric_features: [], required_features: [], optional_features: [], excluded_features: [], preprocessing: none, hyperparameters: {}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    b1_phase_only: {model_family: logistic_regression, feature_scope: pre_action_context, categorical_features: [phase_label], numeric_features: [], required_features: [phase_label], optional_features: [], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {C: 1.0, max_iter: 1000}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    b2_spatial_only: {model_family: regularized_logistic_regression, feature_scope: pre_action_context, categorical_features: [], numeric_features: [action_x, action_y], required_features: [action_x, action_y], optional_features: [distance_to_center_line], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {C: 0.5, max_iter: 1000}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    b3_action_context: {model_family: regularized_logistic_regression, feature_scope: pre_action_context, categorical_features: [event_type, action_family, phase_label], numeric_features: [action_x, action_y], required_features: [event_type, action_family, phase_label, action_x, action_y], optional_features: [position_group], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {C: 1.0, max_iter: 1000}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    b4_spatial_phase_action: {model_family: regularized_logistic_regression, feature_scope: pre_action_context, categorical_features: [phase_label, action_family, event_type, action_zone], numeric_features: [action_x, action_y, distance_to_center_line], required_features: [phase_label, action_family, event_type, action_x, action_y], optional_features: [action_zone, distance_to_center_line], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {C: 0.7, max_iter: 1000}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    b5_360_geometry: {require_roles_known: true, require_reliable_5m_visibility: false, require_reliable_10m_visibility: false, model_family: hist_gradient_boosting_classifier, feature_scope: pre_action_context, categorical_features: [phase_label, action_family], numeric_features: [action_x, action_y, visible_attacker_count, visible_defender_count, attacker_defender_ratio, nearest_attacker_distance, nearest_defender_distance], required_features: [phase_label, action_family, action_x, action_y, visible_attacker_count, visible_defender_count], optional_features: [attacker_defender_ratio, nearest_attacker_distance, nearest_defender_distance], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {max_iter: 100, learning_rate: 0.05}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: true}
    b6_full_without_360: {model_family: regularized_logistic_regression, feature_scope: pre_action_context, categorical_features: [phase_label, action_family, event_type, position_group, play_pattern], numeric_features: [action_x, action_y, distance_to_center_line, possession_elapsed_seconds, event_order_in_possession], required_features: [phase_label, action_family, event_type, action_x, action_y], optional_features: [position_group, play_pattern, distance_to_center_line, possession_elapsed_seconds, event_order_in_possession], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {C: 0.5, max_iter: 1000}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    b7_full_with_360: {require_roles_known: true, require_reliable_5m_visibility: false, require_reliable_10m_visibility: false, model_family: hist_gradient_boosting_classifier, feature_scope: pre_action_context, categorical_features: [phase_label, action_family, event_type, position_group], numeric_features: [action_x, action_y, distance_to_center_line, visible_attacker_count, visible_defender_count, attacker_defender_ratio, nearest_attacker_distance, nearest_defender_distance], required_features: [phase_label, action_family, event_type, action_x, action_y, visible_attacker_count, visible_defender_count], optional_features: [position_group, distance_to_center_line, attacker_defender_ratio, nearest_attacker_distance, nearest_defender_distance], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {max_iter: 100, learning_rate: 0.05}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: true}
    b8_interpretable_reduced: {model_family: logistic_regression, feature_scope: pre_action_context, categorical_features: [phase_label, action_family], numeric_features: [action_x, action_y], required_features: [phase_label, action_family, action_x, action_y], optional_features: [], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {C: 1.0, max_iter: 1000}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
regression:
  target: target_future_xg_10s
  clip_negative_predictions: true
  variants:
    r0_constant: {model_family: mean_baseline, feature_scope: pre_action_context, categorical_features: [], numeric_features: [], required_features: [], optional_features: [], excluded_features: [], preprocessing: none, hyperparameters: {}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    r1_spatial_linear: {model_family: ridge, feature_scope: pre_action_context, categorical_features: [], numeric_features: [action_x, action_y], required_features: [action_x, action_y], optional_features: [distance_to_center_line], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {alpha: 1.0}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    r2_action_context_linear: {model_family: elastic_net, feature_scope: pre_action_context, categorical_features: [event_type, action_family, phase_label], numeric_features: [action_x, action_y], required_features: [event_type, action_family, phase_label, action_x, action_y], optional_features: [], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {alpha: 0.01, l1_ratio: 0.2, max_iter: 5000}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    r3_full_without_360: {model_family: ridge, feature_scope: pre_action_context, categorical_features: [phase_label, action_family, event_type, position_group, play_pattern], numeric_features: [action_x, action_y, distance_to_center_line, possession_elapsed_seconds, event_order_in_possession], required_features: [phase_label, action_family, event_type, action_x, action_y], optional_features: [position_group, play_pattern, distance_to_center_line, possession_elapsed_seconds, event_order_in_possession], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {alpha: 2.0}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    r4_full_with_360: {require_roles_known: true, require_reliable_5m_visibility: false, require_reliable_10m_visibility: false, model_family: hist_gradient_boosting_regressor, feature_scope: pre_action_context, categorical_features: [phase_label, action_family, event_type], numeric_features: [action_x, action_y, visible_attacker_count, visible_defender_count, attacker_defender_ratio, nearest_attacker_distance, nearest_defender_distance], required_features: [phase_label, action_family, event_type, action_x, action_y, visible_attacker_count, visible_defender_count], optional_features: [attacker_defender_ratio, nearest_attacker_distance, nearest_defender_distance], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {max_iter: 100, learning_rate: 0.05}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: true}
    r5_interpretable_reduced: {model_family: ridge, feature_scope: pre_action_context, categorical_features: [phase_label, action_family], numeric_features: [action_x, action_y], required_features: [phase_label, action_family, action_x, action_y], optional_features: [], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {alpha: 1.0}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
    r6_nonlinear_candidate: {model_family: hist_gradient_boosting_regressor, feature_scope: pre_action_context, categorical_features: [phase_label, action_family, event_type], numeric_features: [action_x, action_y, distance_to_center_line], required_features: [phase_label, action_family, event_type, action_x, action_y], optional_features: [distance_to_center_line], excluded_features: [], preprocessing: one_hot_standard, hyperparameters: {max_iter: 100, learning_rate: 0.05}, missingness_policy: impute, minimum_usable_rows: 10, requires_360: false}
